services:
  api:
    build: .
    container_name: event-processor-api

    env_file:
      - .env

    ports:
      - "8000:8000"

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    restart: unless-stopped

  worker:
    build: .
    container_name: event-processor-worker

    env_file:
      - .env

    command: >
      python -m app.workers.advantage_sender

    restart: unless-stopped